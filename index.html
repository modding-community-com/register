<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registry | modding-community.com</title>
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="manifest" href="favicon/site.webmanifest" />
    <style>
        :root {
            --bg: #0d021a;
            --surface: #160826;
            --surface-hover: #1e0b33;
            --text: #e2e2f0;
            --text-dim: #948ba1;
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.3);
            --border: #2d1a45;
            --input-bg: #080112;
            --cog-color: rgba(157, 78, 221, 0.04);
            --vignette: rgb(5, 0, 10); 
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text);
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 20px;
            background: var(--bg);
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, var(--vignette) 150%);
            pointer-events: none;
            z-index: 100;
        }

        .cog-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .cog { position: absolute; fill: var(--cog-color); transition: fill 0.3s ease; }
        .cog-1 { width: 600px; height: 600px; top: -150px; left: -200px; animation: rotate 120s linear infinite; }
        .cog-2 { width: 400px; height: 400px; bottom: -100px; right: -150px; animation: rotate 80s linear infinite reverse; }

        header {
            margin-bottom: 50px;
            text-align: center;
        }

        h1 { 
            margin: 0; 
            font-size: 2.5rem; 
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-container {
            display: inline-flex;
            background: var(--surface);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 50px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn:hover { color: #fff; }

        .nav-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .controls-row {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            position: relative;
            z-index: 101;
        }

        .search-bar {
            flex-grow: 1;
            padding: 16px 20px;
            font-size: 1rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .refresh-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0 20px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .refresh-btn:hover { 
            background: var(--surface-hover);
            border-color: var(--text-dim);
        }

        .community-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            position: relative;
            z-index: 101;
        }

        .community-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            display: flex;
            flex-direction: column;
        }

        .community-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            background: var(--surface-hover);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .community-icon-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #05000a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .community-icon { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .community-card:hover .community-icon { transform: scale(1.05); }

        .icon-fallback { font-size: 40px; color: var(--border); font-weight: 800; }

        .community-info { padding: 20px; text-align: left; }
        .community-display-name { color: #fff; font-weight: 700; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .community-subdomain { color: var(--accent); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .creator-box {
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            background: var(--surface);
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 101;
        }

        .form-group { margin-bottom: 24px; }
        label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 0.9rem; color: var(--text-dim); }
        
        input, select {
            width: 100%; padding: 14px; border: 1px solid var(--border);
            border-radius: 12px; box-sizing: border-box; 
            background-color: var(--input-bg); color: var(--text);
            font-size: 1rem; transition: border 0.2s;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--accent); }

        .output-area {
            margin-top: 30px; background: #05000a; padding: 24px;
            border-radius: 16px; border: 1px solid var(--border);
            position: relative;
        }

        pre { margin: 0; font-size: 0.9rem; color: #b892ff; font-family: 'JetBrains Mono', monospace; overflow-x: auto; }

        .button-group { display: flex; gap: 12px; margin-top: 20px; }

        .action-btn {
            background: var(--accent); color: white; border: none; padding: 16px;
            border-radius: 12px; cursor: pointer; font-weight: 700; flex: 1;
            transition: all 0.2s;
        }
        
        .action-btn.secondary { background: var(--border); color: var(--text); }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .action-btn:active { transform: translateY(0); }

        .step-box {
            background: rgba(157, 78, 221, 0.05);
            padding: 30px;
            border-radius: 24px;
            margin-top: 40px;
            border: 1px solid var(--border);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            z-index: 101;
        }

        .step-box h4 { margin: 0 0 15px 0; color: #fff; font-size: 1.2rem; }
        .step-box ol { padding-left: 20px; color: var(--text-dim); }
        .step-box li { margin-bottom: 12px; }

        footer {
            margin-top: 100px; font-size: 0.9rem; color: var(--text-dim);
            border-top: 1px solid var(--border); padding-top: 40px; text-align: center;
            position: relative;
            z-index: 101;
        }

        footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="vignette"></div>

    <div class="cog-container">
        <svg class="cog cog-1" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M6.50001 0H9.50001L10.0939 2.37548C10.7276 2.6115 11.3107 2.95155 11.8223 3.37488L14.1782 2.70096L15.6782 5.29904L13.9173 7.00166C13.9717 7.32634 14 7.65987 14 8C14 8.34013 13.9717 8.67366 13.9173 8.99834L15.6782 10.701L14.1782 13.299L11.8223 12.6251C11.3107 13.0484 10.7276 13.3885 10.0939 13.6245L9.50001 16H6.50001L5.90614 13.6245C5.27242 13.3885 4.68934 13.0484 4.17768 12.6251L1.82181 13.299L0.321808 10.701L2.08269 8.99834C2.02831 8.67366 2.00001 8.34013 2.00001 8C2.00001 7.65987 2.02831 7.32634 2.08269 7.00166L0.321808 5.29904L1.82181 2.70096L4.17768 3.37488C4.68934 2.95155 5.27241 2.6115 5.90614 2.37548L6.50001 0ZM8.00001 10C9.10458 10 10 9.10457 10 8C10 6.89543 9.10458 6 8.00001 6C6.89544 6 6.00001 6.89543 6.00001 8C6.00001 9.10457 6.89544 10 8.00001 10Z" /></svg>
        <svg class="cog cog-2" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M6.50001 0H9.50001L10.0939 2.37548C10.7276 2.6115 11.3107 2.95155 11.8223 3.37488L14.1782 2.70096L15.6782 5.29904L13.9173 7.00166C13.9717 7.32634 14 7.65987 14 8C14 8.34013 13.9717 8.67366 13.9173 8.99834L15.6782 10.701L14.1782 13.299L11.8223 12.6251C11.3107 13.0484 10.7276 13.3885 10.0939 13.6245L9.50001 16H6.50001L5.90614 13.6245C5.27242 13.3885 4.68934 13.0484 4.17768 12.6251L1.82181 13.299L0.321808 10.701L2.08269 8.99834C2.02831 8.67366 2.00001 8.34013 2.00001 8C2.00001 7.65987 2.02831 7.32634 2.08269 7.00166L0.321808 5.29904L1.82181 2.70096L4.17768 3.37488C4.68934 2.95155 5.27241 2.6115 5.90614 2.37548L6.50001 0ZM8.00001 10C9.10458 10 10 9.10457 10 8C10 6.89543 9.10458 6 8.00001 6C6.89544 6 6.00001 6.89543 6.00001 8C6.00001 9.10457 6.89544 10 8.00001 10Z" /></svg>
    </div>

    <header>
        <h1>*.modding-community.com</h1>
    </header>

    <nav class="nav-container">
        <button class="nav-btn active" onclick="switchTab('browse')">Browse</button>
        <button class="nav-btn" onclick="switchTab('create')">Register</button>
    </nav>

    <section id="section-browse" class="page-section active">
        <div class="controls-row">
            <input type="text" id="searchBar" class="search-bar" placeholder="Search communities..." oninput="filterCommunities()">
            <button class="refresh-btn" onclick="fetchRegistry(true)" title="Refresh List">Refresh</button>
        </div>
        <div id="loading" style="text-align: center; color: var(--accent); padding: 40px; font-weight: 600;">Loading registry...</div>
        <div class="community-grid" id="community-grid"></div>
    </section>

    <section id="section-create" class="page-section">
        <div class="creator-box">
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="disp-name" placeholder="Epic Modding Hub" oninput="updateJson()">
            </div>
            <div class="form-group">
                <label>Subdomain</label>
                <input type="text" id="sub-name" placeholder="epic-mods" oninput="updateJson()">
            </div>
            <div class="form-group">
                <label>Record Type</label>
                <select id="rec-type" onchange="updateJson()">
                    <option value="CNAME">CNAME (GitHub Pages, Vercel)</option>
                    <option value="A">A (Direct IP)</option>
                    <option value="REDIRECT">REDIRECT (Forwarding)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Target Value</label>
                <input type="text" id="target-val" placeholder="user.github.io" oninput="updateJson()">
            </div>

            <div class="output-area">
                <label style="color:var(--text-dim); font-size: 0.75rem; display:block; margin-bottom:12px; font-family: monospace;">FILE: <span id="filename-preview" style="color:var(--accent)">subdomain.json</span></label>
                <pre id="json-display">{}</pre>
            </div>
            
            <div class="button-group">
                <button class="action-btn" onclick="downloadJson()">Download JSON</button>
                <button class="action-btn secondary" onclick="copyJson()">Copy Code</button>
            </div>
        </div>

        <div class="step-box">
            <h4>Submission Steps</h4>
            <ol>
                <li>Fork the <a href="https://github.com/modding-community-com/register" target="_blank">Registry Repo</a>.</li>
                <li>Add your <code>.json</code> to the <code>domains/</code> folder.</li>
                <li>Add your icon (360x480px) to <code>icons/</code> using the same filename.</li>
                <li>Open a <strong>Pull Request</strong>.</li>
            </ol>
        </div>
    </section>

    <footer>
        Managed by the community &bull; <strong>@atomictyler</strong>
        <br><br>
        <a href="https://atomictyler.dev/">Support the Project ♥</a>
    </footer>

    <script>
        let allCommunities = [];

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
            
            if (tab === 'browse') {
                document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
                document.getElementById('section-browse').classList.add('active');
            } else {
                document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
                document.getElementById('section-create').classList.add('active');
            }
        }

        async function fetchRegistry(forceRefresh = false) {
            const loadingEl = document.getElementById('loading');
            loadingEl.style.display = 'block';
            
            try {
                const listResponse = await fetch('https://api.github.com/repos/modding-community-com/register/contents/domains');
                const files = await listResponse.json();

                const fetchPromises = files
                    .filter(file => file.name.endsWith('.json'))
                    .map(async file => {
                        const res = await fetch(`domains/${file.name}`);
                        return await res.json();
                    });

                allCommunities = await Promise.all(fetchPromises);
                renderCommunities(allCommunities);
            } catch (e) {
                loadingEl.textContent = "Unable to load registry. Check connection.";
            }
        }

        function renderCommunities(list) {
            const grid = document.getElementById('community-grid');
            document.getElementById('loading').style.display = 'none';
            grid.innerHTML = '';

            list.forEach(item => {
                const sub = item.subdomain;
                const display = item.display || sub;

                const card = document.createElement('a');
                card.className = 'community-card';
                card.href = `https://${sub}.modding-community.com`;
                card.target = "_blank";

                const iconWrapper = document.createElement('div');
                iconWrapper.className = 'community-icon-wrapper';
                
                const img = document.createElement('img');
                img.className = 'community-icon';
                const iconBase = `icons/${sub}`;
                const exts = ['.webp', '.png', '.jpg', '.jpeg'];
                let eIdx = 0;

                img.src = iconBase + exts[eIdx];
                img.onerror = () => {
                    eIdx++;
                    if (eIdx < exts.length) img.src = iconBase + exts[eIdx];
                    else {
                        img.style.display = 'none';
                        const fallback = document.createElement('div');
                        fallback.className = 'icon-fallback';
                        fallback.textContent = display.charAt(0).toUpperCase();
                        iconWrapper.appendChild(fallback);
                    }
                };
                iconWrapper.appendChild(img);

                const info = document.createElement('div');
                info.className = 'community-info';
                info.innerHTML = `
                    <span class="community-display-name">${display}</span>
                    <span class="community-subdomain">${sub}.modding-community.com</span>
                `;

                card.appendChild(iconWrapper);
                card.appendChild(info);
                grid.appendChild(card);
            });
        }

        function filterCommunities() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allCommunities.filter(c => 
                (c.display && c.display.toLowerCase().includes(query)) || 
                c.subdomain.toLowerCase().includes(query)
            );
            renderCommunities(filtered);
        }

        function updateJson() {
            const disp = document.getElementById('disp-name').value || "My Community";
            const sub = document.getElementById('sub-name').value || "subdomain";
            const type = document.getElementById('rec-type').value;
            const target = document.getElementById('target-val').value || "target.example.com";

            const config = {
                "subdomain": sub,
                "type": type,
                "target": target,
                "display": disp
            };

            document.getElementById('json-display').textContent = JSON.stringify(config, null, 4);
            document.getElementById('filename-preview').textContent = sub + ".json";
        }

        function downloadJson() {
            const sub = document.getElementById('sub-name').value || "subdomain";
            const content = document.getElementById('json-display').textContent;
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = sub + ".json";
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyJson() {
            const content = document.getElementById('json-display').textContent;
            navigator.clipboard.writeText(content).then(() => {
                alert("JSON copied!");
            });
        }

        updateJson();
        fetchRegistry();
    </script>
</body>
</html>
