name: Register Subdomain
on:
  push:
    branches: [ main ]
    paths: [ 'domains/*.json' ]

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Parse and Create Record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          FILES=$(git diff --name-status HEAD^ HEAD | grep 'domains/.*.json' || true)

          echo "$FILES" | while read -r line; do
              [ -z "$line" ] && continue
              STATUS=$(echo $line | awk '{print $1}')
              FILE_PATH=$(echo $line | awk '{print $2}')
              SUBDOMAIN_NAME=$(basename "$FILE_PATH" .json)
              FULL_DOMAIN="$SUBDOMAIN_NAME.modding-community.com"

              echo "--- Processing: $FULL_DOMAIN ---"

              DNS_IDS=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$FULL_DOMAIN" | jq -r '.result[].id')
              
              for ID in $DNS_IDS; do
                echo "Deleting old DNS record $ID..."
                curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$ID" -H "Authorization: Bearer $CF_API_TOKEN"
              done

              PAGE_RULE_IDS=$(curl -s -H "Authorization: Bearer $CF_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/pagerules" | jq -r ".result[]? | select(.targets[].constraint.value == \"$FULL_DOMAIN/*\") | .id")

              for RID in $PAGE_RULE_IDS; do
                echo "Deleting old Page Rule $RID..."
                curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/pagerules/$RID" -H "Authorization: Bearer $CF_API_TOKEN"
              done

              if [[ "$STATUS" == "A" || "$STATUS" == "M" ]]; then
                  TYPE=$(jq -r '.type' "$FILE_PATH")
                  TARGET=$(jq -r '.target' "$FILE_PATH")

                  if [ "$TYPE" == "REDIRECT" ]; then
                      echo "Setting up REDIRECT..."
                      # Ensure TARGET has http/https for the redirect to work
                      [[ $TARGET != http* ]] && TARGET="https://$TARGET"

                      curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
                          -H "Authorization: Bearer $CF_API_TOKEN" \
                          -H "Content-Type: application/json" \
                          --data "{\"type\":\"AAAA\",\"name\":\"$SUBDOMAIN_NAME\",\"content\":\"100::\",\"proxied\":true}"

                      RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/pagerules" \
                          -H "Authorization: Bearer $CF_API_TOKEN" \
                          -H "Content-Type: application/json" \
                          --data "{\"targets\":[{\"target\":\"url\",\"constraint\":{\"operator\":\"matches\",\"value\":\"$FULL_DOMAIN/*\"}}],\"actions\":[{\"id\":\"forwarding_url\",\"value\":{\"url\":\"$TARGET/\$1\",\"status_code\":301}}],\"status\":\"active\"}")
                      
                      echo "CF Response: $RESPONSE"
                  else
                      echo "Setting up $TYPE record..."
                      curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
                          -H "Authorization: Bearer $CF_API_TOKEN" \
                          -H "Content-Type: application/json" \
                          --data "{\"type\":\"$TYPE\",\"name\":\"$SUBDOMAIN_NAME\",\"content\":\"$TARGET\",\"proxied\":true}"
                  fi
              fi
          done